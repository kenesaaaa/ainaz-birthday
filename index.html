<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Айназ үшін 💖</title>
<style>
    body { margin:0; background:black; overflow:hidden; color:white; font-family:sans-serif; cursor: pointer; }
    #text { position:absolute; width:100%; top:40%; text-align:center; opacity:0; transition:2s; z-index:10; pointer-events: none;}
    h1 { font-size:6vw; text-shadow: 0 0 20px #f73487; }
    p { font-size:3vw; }
    .faded { opacity: 0.4 !important; transition: 3s; }
    
    /* Экранды басу туралы ескерту */
    #hint {
        position: fixed;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.7);
        background: rgba(247, 52, 135, 0.2);
        padding: 10px 0;
        font-size: 16px;
        z-index: 100;
        border-top: 1px solid #f73487;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div id="hint">Музыка қосылу үшін экранды басыңыз 🎵</div>

<canvas id="c"></canvas>

<div id="text">
    <h1 id="msg"></h1>
    <p id="date">22.04.2026 💖</p>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgMusic");
const hint = document.getElementById("hint");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Музыканы іске қосу (Экранды басқанда)
function startEverything() {
    audio.play().then(() => {
        hint.style.display = 'none';
    }).catch(e => {
        console.log("Дыбыс қосылмады:", e);
        hint.innerText = "Қате: music.mp3 файлы табылмады ❌";
    });
}

window.addEventListener('click', startEverything, { once: true });
window.addEventListener('touchstart', startEverything, { once: true });

function heart(t){
    return { 
        x: 16 * Math.pow(Math.sin(t), 3), 
        y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) 
    };
}

let stage = 0; 
let particles = [];
let progress = 0;

for(let i=0; i<600; i++){
    let t = Math.random() * Math.PI * 2;
    let h = heart(t);
    particles.push({
        tx: canvas.width/2 + h.x*15,
        ty: canvas.height/2 + h.y*15,
        x: Math.random() * canvas.width, 
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        color: "#f73487"
    });
}

function typeText(){
    let text = "Happy Birthday, Айназ 💖";
    let index = 0;
    let el = document.getElementById("msg");
    function write(){
        if(index < text.length){
            el.innerHTML += text[index];
            index++;
            setTimeout(write, 80);
        }
    }
    write();
}

function drawTurtleLines(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    for(let j=0; j<5; j++){
        let t = Math.random() * Math.PI * 2;
        let h = heart(t);
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, canvas.height/2);
        ctx.lineTo(canvas.width/2 + h.x*15, canvas.height/2 + h.y*15);
        ctx.strokeStyle = "#f73487";
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function animate(){
    if(stage === 0) {
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.02;
            p.y += (p.ty - p.y) * 0.02;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
        });
        progress++;
        if(progress === 180){
            document.getElementById("text").style.opacity = 1;
            typeText();
            setTimeout(() => { 
                stage = 1; 
                document.getElementById("text").classList.add("faded");
            }, 3000);
        }
    } else {
        drawTurtleLines();
    }
    requestAnimationFrame(animate);
}

animate();

window.onresize = () => { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
};
</script>
</body>
</html>
